<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- displays site properly based on user's device -->

  <link rel="icon" type="image/png" sizes="32x32" href="./images/favicon-32x32.png">
  
  <title>Frontend Mentor | Product preview card component</title>
<script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <!-- Feel free to remove these styles or customise in your own stylesheet 👍 -->
</head>
<body class="bg-[#f2ebe3] flex items-center justify-center m-h-screen font-sans ">
  <div class="flex items-center justify-center bg-white rounded-2xloverflow-hidden shadow-lg  max-w-xl">

    <div class="w-1/2">
      <img src="image-product-desktop.jpg" class="h-full w-full object-cover">
    </div>

    <div class="w-1/2 p-6 flex-col justify-between">
      <div>
        <p class="text-xs tracking-[4px] text-gray-500 mb-4">PERFUME</p>
      
        <h1 class="text-zxl font-bold text-gray-900 leading-tight mb-4">Gabrielle Essence Eau De Parfum</h1>
        <p class="text-sm text-gray-5000 mb-6 leading-relaxed">A floral, solar and voluptuous interpretation composed by Olivier Polge, 
  Perfumer-Creator for the House of CHANEL.
</p>
      </div>

      <div class="flex items-center gap-4 mb-6">
        <span class="text-2xl font-bold text-green-700">$149.99</span>
        <span class="text-sm line-through text-gray-400">$169.99</span>
      </div>

      <button class="bg-green-700 text-white py-3 px-6 rounded-lg hover:bg-green-800 focus:outline-none focus:ring-2 focus:ring-green-500 focus:ring-opacity-50">
        Add to Cart
      </button>
    </div>
  </div>

  </footer> -->
</body>
</html>
